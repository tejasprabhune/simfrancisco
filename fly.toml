# fly.io config for the SF digital-twin backend.
# MODEL_API_KEY is set as a secret (`fly secrets set MODEL_API_KEY=...`), NOT here.
app = "sf-digital-twin-tp"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  RUST_LOG = "info"
  TILES_DB = "server_tiles/sf.db"
  # 10k-agent polls cluster into ≤160 archetypes (~3 batched LLM calls), so latency
  # tracks the call count, not N. Higher in-flight cap parallelizes those calls.
  MODEL_MAX_INFLIGHT = "16"
  MAX_CLUSTERS = "160"
  # In-process news daemon: refresh each city's clock + headlines every N hours.
  # NEWS_API_KEY (set via `fly secrets set`) supplies the live headlines.
  NEWS_REFRESH_HOURS = "6"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    timeout = "8s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  # 5 cities' PUMS in RAM (~240k records) + lazy on-disk slim tiles + per-request
  # populations. 2 GB gives headroom over the ~1 GB working set.
  memory = "2gb"
