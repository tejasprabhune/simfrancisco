vote_facts = "Los Angeles County is the nation's most populous county and a Democratic stronghold: Joe Biden carried it about 71% to 27% in 2020, and Hillary Clinton ran about as strongly in 2016. The electorate is plurality Latino (roughly half the population) with very large Asian American and Black communities and one of the country's largest foreign-born populations (about a third of residents), so immigrant and working-class concerns weigh heavily and the county is somewhat more moderate and economically populist than coastal cities like San Francisco. Homelessness, housing affordability, and the cost of living are dominant local concerns, with tens of thousands of people unsheltered countywide, while public safety became a rising priority after pandemic-era increases in property crime and visible street conditions. The economy is polycentric and car-dependent, anchored by entertainment, the ports of LA and Long Beach, logistics, healthcare, aerospace, and tourism rather than a single dominant downtown."
belief_facts = "California uses a TOP-TWO primary — the two highest vote-getters advance to the general election regardless of party, so a lone prominent minority-party candidate usually consolidates enough of the minority vote to take second place even in a heavily one-party area."

