<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sim francisco — predict the city</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%237758AB' d='M12 2l1.8 5L19 9l-5.2 2L12 16l-1.8-5L5 9l5.2-2z'/%3E%3C/svg%3E" />

  <!-- fonts: Pixelify Sans (title) · futura-pt (body, via Typekit) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://use.typekit.net/bsk0vur.css" />

  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://sf-digital-twin-tp.fly.dev" />
</head>
<body>
  <!-- the map fills the entire page -->
  <canvas id="map"></canvas>

  <div id="ui">
    <!-- top-left: title (pixel font) -->
    <div id="title" class="title"><span>sim</span> <span class="title-accent">francisco</span></div>

    <!-- ambient status line (bottom-left) -->
    <div id="status" class="status">san francisco</div>

    <!-- top-right: query summary + response progress -->
    <div id="summary" class="summary hidden" aria-live="polite">
      <div id="summary-label" class="summary-label">PREDICTING</div>
      <div id="summary-text" class="summary-text"></div>
      <div id="progress" class="progress">
        <div class="progress-track"><div id="progress-fill" class="progress-fill"></div></div>
        <div id="progress-label" class="progress-label"></div>
      </div>
    </div>

    <!-- bottom-center dock: result card expands above the "ask" bar -->
    <div id="dock" class="dock">
      <div id="result-card" class="result-card hidden" role="dialog" aria-modal="false" aria-label="Prediction result"></div>

      <div id="ask" class="ask" data-state="idle">
        <svg class="ask-search" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <circle cx="10.5" cy="10.5" r="6" fill="none" stroke="currentColor" stroke-width="2" />
          <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M15 15l4.5 4.5" />
        </svg>
        <span id="ask-label" class="ask-label">ask</span>
        <input id="ask-input" class="ask-input" type="text" autocomplete="off" spellcheck="false"
               placeholder="predict anything" aria-label="Predict anything" />
        <kbd class="ask-enter" aria-hidden="true">↵</kbd>
      </div>
    </div>

    <div id="toast" class="toast hidden"></div>
  </div>

  <script type="module" src="src/app.js"></script>
</body>
</html>
