vote_facts = "Cook County is the urban core of metropolitan Chicago and one of the most reliably Democratic large counties in the country, giving Joe Biden roughly 74% of the two-party vote in 2020 and Hillary Clinton a similar margin in 2016. The electorate is large and racially diverse, with sizable Black and Latino populations, a deep labor-union tradition (the Chicago Teachers Union and SEIU are major forces), and a strong Catholic and Black-Protestant religious presence alongside a growing unaffiliated share. Crime and public safety, high property taxes and overall cost of living, neighborhood disinvestment on the South and West Sides, and immigration (Chicago is a long-standing sanctuary city that began receiving busloads of migrants in 2022) are the issues that run hottest. The 2023 mayoral race, won by progressive Brandon Johnson over the more crime-focused Paul Vallas after incumbent Lori Lightfoot was eliminated in the first round, exposed durable splits between progressive lakefront and North Side wards and more moderate, working-class Black and white ethnic neighborhoods."
belief_facts = "Illinois holds open partisan primaries; Chicago's municipal elections are officially nonpartisan, going to an April runoff if no candidate clears 50% in the first round."

