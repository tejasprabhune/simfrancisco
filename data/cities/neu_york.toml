vote_facts = "New York City's five-borough electorate is heavily Democratic and diverse: Hillary Clinton took roughly 79% of the citywide vote in 2016 and Joe Biden about 76% in 2020, with Manhattan and the Bronx among the most lopsidedly Democratic counties in the nation while Staten Island leans Republican. The city is majority-minority, with very large Black, Hispanic (Puerto Rican, Dominican, Mexican), and Asian populations, a substantial foreign-born share (around 37%), and the largest Jewish and Catholic communities of any U.S. metro. Voters consistently rank housing affordability and the overall cost of living as top concerns, alongside public safety, homelessness, and the subway and transit system; the city is overwhelmingly renter-occupied and rent-regulated. Turnout in municipal contests is low and dominated by closed Democratic primaries, and trust in city institutions like the NYPD, the MTA, and City Hall is uneven across neighborhoods and racial lines."
belief_facts = "New York holds closed party primaries (no top-two); in heavily Democratic New York City the Democratic primary is effectively decisive, and municipal primaries use ranked-choice voting."

